services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cre
      POSTGRES_USER: cre
      POSTGRES_PASSWORD: cre
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cre -d cre"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cre
      SPRING_DATASOURCE_USERNAME: cre
      SPRING_DATASOURCE_PASSWORD: cre
    ports:
      - "8080:8080"

volumes:
  pgdata: